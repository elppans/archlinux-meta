#!/bin/bash

# =========================================
# Script de configuração baseado em pacotes Flatpak
# =========================================

# =========================================
# Funções de log com cores e emojis
# =========================================
log_info() {
	echo -e "\e[34mINFO:\e[0m $1"
}

log_sucesso() {
	echo -e "\e[32mSUCESSO:\e[0m $1"
}

log_erro() {
	echo -e "\e[31mERRO:\e[0m $1"
}

log_aviso() {
	echo -e "\e[33mAVISO:\e[0m $1"
}

# =========================================
# Função para verificar se um app Flatpak está instalado
# =========================================
verificar_flatpak() {
	flatpak list --app | grep -q "$1"
}

# =========================================
# Funções de configuração
# =========================================

config_vscodium() {
	log_info "Configurando VSCodium (Flatpak)..."

	cd || exit
	sudo cat <<'EOF'> /usr/local/bin/codium
#!/usr/bin/env bash

# 1. Prefere o binário nativo do sistema
if [[ -x /usr/bin/codium ]]; then
    exec /usr/bin/codium "$@"
fi

# 2. Fallback para Flatpak
if command -v flatpak &>/dev/null && flatpak info com.vscodium.codium &>/dev/null; then
    exec flatpak run com.vscodium.codium "$@"
fi

# Caso nenhum seja encontrado, exibe uma mensagem de erro
echo "Nenhuma instalação do 'codium' foi encontrada. Certifique-se de que o codium está instalado!"
exit 1
EOF
sudo chmod +x /usr/local/bin/codium

# Aguarda o sistema estar pronto (se necessário)
sleep 3

sudo curl -JLk -o /tmp/vscodium_extensions.txt "https://raw.githubusercontent.com/elppans/vscodeum-ext/refs/heads/main/vscodium_extensions.txt"
sudo curl -JLk -o /usr/local/bin/vscodeum-extensions "https://raw.githubusercontent.com/elppans/vscodeum/refs/heads/main/usr/local/bin/vscodeum-extensions"
sudo chmod +x /usr/local/bin/vscodeum-extensions
sudo chmod 766 /tmp/vscodium_extensions.txt

# Com retry automático (agora integrado no script)
/usr/local/bin/vscodeum-extensions import vscodium /tmp/vscodium_extensions.txt

# No VSCodium, configurar na extensão shfmt apenas o comando "shfmt", não especificar o caminho
# mkdir -p "$HOME/.var/app/com.vscodium.codium/data/node/bin"
# echo -e '#!/bin/bash\nflatpak-spawn --host shfmt "$@"\n' | tee "$HOME/.var/app/com.vscodium.codium/data/node/bin/shfmt" 
# chmod +x "$HOME/.var/app/com.vscodium.codium/data/node/bin/shfmt" 
}
config_gtkhash() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run org.gtkhash.gtkhash "$@"\n' | sudo tee /usr/local/bin/gtkhash
sudo chmod +x /usr/local/bin/gtkhash
}
config_winehq() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run org.winehq.Wine "$@"\n' | sudo tee /usr/local/bin/wine
echo -e '#!/bin/bash\n/usr/bin/flatpak run --command=winetricks org.winehq.Wine "$@"\n' | sudo tee /usr/local/bin/winetricks
sudo chmod +x /usr/local/bin/wine
sudo chmod +x /usr/local/bin/winetricks
}
config_protontricks() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run com.github.Matoking.protontricks "$@"\n' | sudo tee /usr/local/bin/protontricks
sudo chmod +x /usr/local/bin/protontricks
}
config_protonplus() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run com.vysp3r.ProtonPlus "$@"\n' | sudo tee /usr/local/bin/protonplus
sudo chmod +x /usr/local/bin/protonplus
}
config_heroicgames() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run com.heroicgameslauncher.hgl "$@"\n' | sudo tee /usr/local/bin/heroic
sudo chmod +x /usr/local/bin/heroic
}
config_kate() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run org.kde.kate "$@"\n' | sudo tee /usr/local/bin/kate
sudo chmod +x /usr/local/bin/kate
}
config_telegram() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run org.telegram.desktop "$@"\n' | sudo tee /usr/local/bin/telegram
sudo chmod +x /usr/local/bin/telegram
}
config_discord() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run com.discordapp.Discord "$@"\n' | sudo tee /usr/local/bin/discord
sudo chmod +x /usr/local/bin/discord
}
config_dbeaver() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run io.dbeaver.DBeaverCommunity "$@"\n' | sudo tee /usr/local/bin/dbeaver
sudo chmod +x /usr/local/bin/dbeaver
}
config_meld() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run org.gnome.meld "$@"\n' | sudo tee /usr/local/bin/meld
sudo chmod +x /usr/local/bin/meld
}
config_lutris() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run net.lutris.Lutris "$@"\n' | sudo tee /usr/local/bin/lutris
sudo chmod +x /usr/local/bin/lutris
}
config_steam() {
echo -e '#!/bin/bash\n/usr/bin/flatpak run com.valvesoftware.Steam "$@"\n' | sudo tee /usr/local/bin/steam
sudo chmod +x /usr/local/bin/steam
}
config_zapzap() {
	flatpak override --user --filesystem=home com.rtosta.zapzap
}
config_flameshot() {
	sudo cat <<'EOF'> /usr/local/bin/flameshot
#!/bin/bash

options=("$@")

# Detecta se a sessão atual é Wayland
IS_WAYLAND=false
if [ "$XDG_SESSION_TYPE" == "wayland" ]; then
    IS_WAYLAND=true
fi

if [ -f /usr/bin/flameshot ]; then
    # Se for Wayland, aplica as variáveis antes de rodar a versão nativa
    if [ "$IS_WAYLAND" = true ]; then
        export QT_QPA_PLATFORM=wayland
        export QT_SCREEN_SCALE_FACTORS="1;1"
    fi
    /usr/bin/flameshot "${options[@]}"
else
    # Lógica do Flatpak
    if ! flatpak permissions | grep "org.flameshot.Flameshot" | grep -q "background.*yes"; then
        flatpak permission-set background background org.flameshot.Flameshot yes
    fi
    if ! flatpak permissions | grep "org.flameshot.Flameshot" | grep -q "screenshot.*yes"; then
        flatpak permission-set screenshot screenshot org.flameshot.Flameshot yes
    fi

    # Se for Wayland, adiciona os envs no comando do Flatpak
    if [ "$IS_WAYLAND" = true ]; then
        flatpak run --env=QT_QPA_PLATFORM=wayland --env=QT_SCREEN_SCALE_FACTORS="1;1" \
        org.flameshot.Flameshot "${options[@]}"
    else
        flatpak run org.flameshot.Flameshot "${options[@]}"
    fi
fi
EOF
sudo chmod +x /usr/local/bin/flameshot
}
# =========================================
# Mapeamento função => lista de apps Flatpak
# =========================================
declare -A CONFIGURACOES_FLATPAK=(
	[config_vscodium]="com.vscodium.codium"
	[config_gtkhash]="org.gtkhash.gtkhash"
	[config_winehq]="org.winehq.Wine"
	[config_protontricks]="com.github.Matoking.protontricks"
	[config_protonplus]="com.vysp3r.ProtonPlus"
	[config_heroicgames]="com.heroicgameslauncher.hgl"
	[config_kate]="org.kde.kate"
	[config_telegram]="org.telegram.desktop"
	[config_discord]="com.discordapp.Discord"
	[config_dbeaver]="io.dbeaver.DBeaverCommunity"
	[config_meld]="org.gnome.meld"
	[config_lutris]="net.lutris.Lutris"
	[config_steam]="com.valvesoftware.Steam"
	[config_zapzap]='com.rtosta.zapzap'
	[config_flameshot]='org.flameshot.Flameshot'
)

# =========================================
# Loop que aplica configuração para apps instalados
# =========================================
for funcao in "${!CONFIGURACOES_FLATPAK[@]}"; do
	for app in ${CONFIGURACOES_FLATPAK[$funcao]}; do
		if verificar_flatpak "$app"; then
			log_info "Aplicando $funcao para Flatpak detectado: $app"
			"$funcao"
			break
		fi
	done
done

log_sucesso "Todas as configurações Flatpak foram aplicadas com sucesso!"
