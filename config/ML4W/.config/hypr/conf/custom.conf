# ----------------------------------------------------- 
# VARIÁVEIS DE AMBIENTE (ENV)
# ----------------------------------------------------- 
env = SDL_VIDEODRIVER,wayland                              # Driver de vídeo para Wayland
env = WLR_NO_HARDWARE_CURSORS,1                            # Desativar cursor por hardware (correção p/ Nvidia)
env = XCURSOR_SIZE,24                                      # Tamanho do cursor X11
env = HYPRCURSOR_SIZE,24                                   # Tamanho do cursor Hyprland
env = GSK_RENDERER,ngl                                     # Renderizador GTK4 (correção de seleção de texto)
# env = QT_QPA_PLATFORMTHEME,qt5ct                         # Tema Qt
# env = SDL_VIDEODRIVER,x11                                # Driver de vídeo para X11

# ----------------------------------------------------- 
# CONFIGURAÇÕES DE SISTEMA & CORREÇÕES
# ----------------------------------------------------- 
xwayland {
    force_zero_scaling = true                                # Forçar escala zero no XWayland
}

cursor {
    no_hardware_cursors = true                             # Desativar cursores por hardware (moderno)
    sync_gsettings_theme = true                            # Sincronizar tema de cursor com GSettings
}

debug {
    damage_tracking = 2                                      # Monitoramento de redesenho (padrão estável)
}

misc {
    vfr = false                                              # Forçar atualização de frames (corrige seleção invisível)
}

# layerrule = blur, waybar                                 # Blur na barra Waybar

# ----------------------------------------------------- 
# AUTOSTART (INICIALIZAÇÃO)
# ----------------------------------------------------- 
# exec-once = /usr/local/bin/autostart.sh                                # Script de autostart do sistema
exec-once = flatpak run --command=zapzap com.rtosta.zapzap --hideStart # Iniciar ZapZap minimizado
exec-once = flatpak run com.discordapp.Discord %U --start-minimized    # Iniciar Discord minimizado
exec-once = flatpak run com.valvesoftware.Steam %U -silent             # Iniciar Steam em modo silencioso
exec-once = flatpak run com.heroicgameslauncher.hgl %U               # Heroic Games
exec-once = flatpak run --command=Telegram org.telegram.desktop -autostart # Telegram

# ----------------------------------------------------- 
# ATALHOS - APLICATIVOS E SISTEMA
# ----------------------------------------------------- 
bind = $mainMod, A, exec, pkill rofi || rofi -show drun -replace -i    # Launcher de aplicativos (Rofi)
bind = $mainMod, HOME, exec, ~/.config/waybar/toggle.sh                # Alternar visibilidade da Waybar
bind = $mainMod CTRL, HOME, exec, ~/.config/waybar/launch.sh           # Recarregar/Reiniciar Waybar
bind = CTRL ALT, DELETE, exec, qs ipc call power toggle               # Menu de energia (Power Menu)

# ----------------------------------------------------- 
# GERENCIAMENTO DE JANELAS (LAYOUT)
# ----------------------------------------------------- 
bind = $mainMod, END, togglefloating                                   # Alternar janela atual para flutuante
bind = $mainMod SHIFT, END, workspaceopt, allfloat                     # Alternar todas as janelas para flutuante
bind = $mainMod, J, layoutmsg, togglesplit                             # Alternar divisão (Vertical/Horizontal)
bind = $mainMod, PAGE_UP, layoutmsg, togglesplit                       # Alternar divisão (Atalho 2)
bind = $mainMod CTRL, left, layoutmsg, togglesplit                     # Alternar divisão (Atalho 3)
bind = $mainMod, K, layoutmsg, swapsplit                             # Trocar lado das janelas divididas
bind = $mainMod, PAGE_DOWN, layoutmsg, swapsplit                       # Trocar lado (Atalho 2)
bind = $mainMod CTRL, right, layoutmsg, swapsplit                      # Trocar lado (Atalho 3)

# Mover posição das janelas (Swap)
unbind = $mainMod ALT, left
unbind = $mainMod ALT, right
unbind = $mainMod ALT, up
unbind = $mainMod ALT, down
binde = $mainMod ALT, left, swapwindow, l                              # Mover janela para a esquerda
binde = $mainMod ALT, right, swapwindow, r                             # Mover janela para a direita
binde = $mainMod ALT, up, swapwindow, u                                # Mover janela para cima
binde = $mainMod ALT, down, swapwindow, d                              # Mover janela para baixo

# ----------------------------------------------------- 
# CAPTURA DE TELA E FERRAMENTAS
# ----------------------------------------------------- 
$d=[$ut|Screen Capture]
bindd = $mainMod Shift, P, $d color picker, exec, hyprpicker -an       # Seletor de cores (Hex -> Clipboard)
bindd = $mainMod SHIFT, PRINT, $d snip, exec, hyprctl dispatch exec "[float; center; size 900 600] $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh s"  # Print de área selecionada
binddl = $mainMod CTRL, PRINT, $d print all, exec, hyprctl dispatch exec "[float; center; size 900 600] $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh p" # Print de todos os monitores
binddl = , PRINT, $d print monitor, exec, hyprctl dispatch exec "[float; center; size 900 600] $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh m"         # Print do monitor atual
bindd = $mainMod ALT, PRINT, $d freeze and snip screen, exec, hyprctl dispatch exec "[float; center; size 900 600] $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh sf" # partial screenshot capture (frozen screen)
