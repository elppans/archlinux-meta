# Add your additional Hyprland configurations here
#
# This is an additional key binding
# bind = $mainMod CTRL, up, workspace, empty
#
# Ps.: Super+CTRL+K = Janela de atalhos padrão

# **Customização das ações**

# Aplicativos
# bind = $mainMod, N, exec, ~/.config/ml4w/settings/browser.sh             # Open the browser (Padrão B)
bind = $mainMod, A, exec, pkill rofi || rofi -show drun -replace -i        # Open application launcher

# Barra de tarefas
# bind = $mainMod, B, exec, ~/.config/waybar/toggle.sh                     # Toggle waybar
bind = $mainMod, HOME, exec, ~/.config/waybar/toggle.sh                    # Toggle waybar
bind = $mainMod CTRL, HOME, exec, ~/.config/waybar/launch.sh               # Reload waybar

# Bloqueio, Power e Logout
# bind = $mainMod, L, exec, ~/.config/hypr/scripts/power.sh lock           # Start wlogout
# bind = $mainMod CTRL, DELETE, exec, ~/.config/ml4w/scripts/wlogout.sh    # Start wlogout
# bind = $mainMod CTRL, DELETE, exec, ~/.config/hypr/scripts/power.sh lock # Start wlogout
# bind = CTRL ALT, DELETE, exec, ~/.config/ml4w/scripts/wlogout.sh         # Start wlogout

# Alternar janelas
bind = $mainMod, END, togglefloating                                                        # Alternar janelas ativas para o modo flutuante (janela selecionada acima de outras)
bind = $mainMod SHIFT, END, workspaceopt, allfloat                                          # Alternar todas as janelas para o modo flutuante

# ToggleSplit = alternar divisão (Vertical, Horizontal)
bind = $mainMod, J, layoutmsg, togglesplit                                                  # Toggle split
bind = $mainMod, PAGE_UP, layoutmsg, togglesplit                                            # Toggle split
bind = $mainMod CTRL, left, layoutmsg, togglesplit                                          # Toggle split

# Swapsplit = Trocar divisão (Troca o lado, Ex.: App 1/2 > 2/1)
bind = $mainMod, K, layoutmsg, swapsplit                                                    # Swapsplit
bind = $mainMod, PAGE_DOWN, layoutmsg, swapsplit                                            # Swapsplit
bind = $mainMod CTRL, right, layoutmsg, swapsplit                                           # Swapsplit

unbind = $mainMod ALT, left
unbind = $mainMod ALT, right
unbind = $mainMod ALT, up
unbind = $mainMod ALT, down
binde = $mainMod ALT, left, swapwindow, l                                                    # Swap tiled window left
binde = $mainMod ALT, right, swapwindow, r                                                   # Swap tiled window right
binde = $mainMod ALT, up, swapwindow, u                                                      # Swap tiled window up
binde = $mainMod ALT, down, swapwindow, d                                                    # Swap tiled window down

# Observaçoes:
# Super+Seta = Troca a seleçao de janela ativa
# Super+ALT+Seta = Troca a janela de lado, na direçao escolhida
# Super+Shift+Seta = Aumenta/Diminui o tamanho da janela

### Comandos customizados

# **Configuração do arquivo keybindings**
$d=[$ut|Screen Capture]
bindd = $mainMod Shift, P, $d color picker, exec, hyprpicker -an                                                      # Pick color (Hex) >> clipboard
bindd = $mainMod SHIFT, PRINT, $d freeze and snip screen, exec, $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh s   # partial screenshot capture
# bindd = $mainMod CTRL, PRINT, $d freeze and snip screen, exec, $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh sf # partial screenshot capture (frozen screen)
binddl = $mainMod CTRL, PRINT, $d print all monitors, exec, $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh p       # all monitors screenshot capture
binddl = , PRINT, $d print monitor , exec, $HOME/.config/hyde/.local/lib/hyde/screenshot2.sh m                 	      # monitor screenshot capture




